name: Build and publish Docker image

on:
  push:
    branches:
      - main
    paths:
      - Dockerfile
      - .last-openclaw-version
      - .github/workflows/docker-publish.yml
  workflow_dispatch:

permissions:
  contents: write
  packages: write

env:
  GHCR_IMAGE: ghcr.io/luprintech/openclaw-nas-docker
  DOCKERHUB_IMAGE: luprintechdev/openclaw-nas-docker

jobs:
  docker:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Read OpenClaw version
        id: version
        run: |
          VERSION="$(tr -d '[:space:]' < .last-openclaw-version)"
          [[ -n "$VERSION" ]] || { echo "ERROR: .last-openclaw-version is empty"; exit 1; }
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          provenance: false
          platforms: linux/amd64
          build-args: |
            OPENCLAW_VERSION=${{ steps.version.outputs.version }}
          tags: |
            ${{ env.GHCR_IMAGE }}:latest
            ${{ env.GHCR_IMAGE }}:${{ steps.version.outputs.version }}
            ${{ env.DOCKERHUB_IMAGE }}:latest
            ${{ env.DOCKERHUB_IMAGE }}:${{ steps.version.outputs.version }}

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          TAG="v${VERSION}"

          if git ls-remote --tags origin | grep -q "refs/tags/${TAG}$"; then
            echo "Tag ${TAG} already exists — skipping release creation"
            exit 0
          fi

          cat > release-notes.md << EOF
          OpenClaw NAS Docker — ${TAG}

          ## Docker images

              ghcr.io/luprintech/openclaw-nas-docker:${VERSION}
              luprintechdev/openclaw-nas-docker:${VERSION}

          ## Install

              bash <(curl -fsSL https://raw.githubusercontent.com/luprintech/openclaw-nas-docker/main/install.sh) <NAS_IP>

          See [README](https://github.com/luprintech/openclaw-nas-docker#readme) for full setup instructions.
          EOF

          gh release create "${TAG}" \
            --title "${TAG}" \
            --notes-file release-notes.md \
            --latest
